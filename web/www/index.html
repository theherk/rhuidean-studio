<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rhuidean Studio</title>
    <meta property="og:title" content="Rhuidean Studio">
    <meta property="og:description" content="A polyrhythmic orbital music visualizer.">
    <meta property="og:image" content="https://rhuidean.studio/og-image.png">
    <meta property="og:url" content="https://rhuidean.studio">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="canvas-root">
            <canvas id="canvas"></canvas>
            <canvas id="bloom-canvas"></canvas>
        </div>
        <button id="controls-toggle" class="controls-toggle-bar" aria-label="Toggle controls">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div id="controls">
            <h1>
                <img src="favicon.svg" alt="" width="24" height="24" style="vertical-align: middle; margin-right: 6px;">Rhuidean Studio
                <a href="https://github.com/theherk/rhuidean-studio" target="_blank" rel="noopener" aria-label="Source on GitHub" class="github-link">
                    <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
                </a>
                <button id="controls-collapse" aria-label="Collapse controls" class="header-icon-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
            </h1>

            <div class="buttons">
                <button id="btn-play" title="Play / Pause"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg></button>
                <button id="btn-reset" title="Reset orbits. Click again quickly to restore all defaults."><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,4 1,10 7,10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg></button>
                <button id="btn-share" title="Copy shareable URL to clipboard"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg></button>
            </div>

            <div class="control-group" title="Velocity ratio between inner and outer orbits; controls the polyrhythmic convergence pattern">
                <label for="ratio">Ratio</label>
                <select id="ratio"></select>
            </div>

            <div class="control-group" id="custom-ratio-group" style="display:none">
                <label>Custom</label>
                <div class="inline">
                    <input type="number" id="custom-p" min="1" max="99" value="3">
                    <span>/</span>
                    <input type="number" id="custom-q" min="1" max="99" value="2">
                    <span id="custom-name"></span>
                </div>
            </div>

            <div class="control-group" title="Number of concentric orbiting circles">
                <label for="orbits">Orbits: <span id="orbits-val">12</span></label>
                <input type="range" id="orbits" min="2" max="32" value="12">
            </div>

            <div class="control-group" title="How speeds are distributed between inner and outer orbits">
                <label for="velocity-mode">Velocity</label>
                <select id="velocity-mode">
                    <option value="linear" title="Evenly spaced speeds between inner and outer">Linear</option>
                    <option value="geometric" title="Exponentially spaced speeds">Geometric</option>
                    <option value="inverse_square" title="Kepler-like: faster orbits closer to center">Inverse-Square</option>
                    <option value="harmonic_series" title="Speeds follow the harmonic series 1/n">Harmonic Series</option>
                    <option value="integer_harmonic" title="Speeds rounded to integer multiples of the base">Integer Harmonic</option>
                </select>
            </div>

            <div class="control-group" title="Pitch mapping system; determines the frequency each orbit plays on crossing">
                <label for="tuning">Tuning</label>
                <select id="tuning">
                    <option value="overtone" title="Frequencies are integer multiples of the base">Overtone Series</option>
                    <option value="equal_temperament" title="Octave divided into N equal semitones">Equal Temperament</option>
                    <option value="just_intonation" title="Frequencies from pure whole-number ratios">Just Intonation</option>
                    <option value="pythagorean" title="Frequencies from stacked perfect fifths (3/2)">Pythagorean</option>
                </select>
            </div>

            <div class="control-group" title="Assign each orbit to successive degrees of a musical scale">
                <label>
                    <input type="checkbox" id="scale-enabled"> Scale
                </label>
            </div>

            <div id="scale-options" style="display:none">
                <div class="control-group" title="Root note of the scale">
                    <label for="scale-root">Root</label>
                    <select id="scale-root">
                        <option value="C">C</option>
                        <option value="C#">C&#9839; / D&#9837;</option>
                        <option value="D">D</option>
                        <option value="D#">D&#9839; / E&#9837;</option>
                        <option value="E">E</option>
                        <option value="F">F</option>
                        <option value="F#">F&#9839; / G&#9837;</option>
                        <option value="G">G</option>
                        <option value="G#">G&#9839; / A&#9837;</option>
                        <option value="A" selected>A</option>
                        <option value="A#">A&#9839; / B&#9837;</option>
                        <option value="B">B</option>
                    </select>
                </div>

                <div class="control-group" title="Scale type to constrain pitches to">
                    <label for="scale-type">Scale</label>
                    <select id="scale-type">
                        <optgroup label="Diatonic Modes">
                            <option value="ionian">Ionian (Major)</option>
                            <option value="dorian">Dorian</option>
                            <option value="phrygian">Phrygian</option>
                            <option value="lydian">Lydian</option>
                            <option value="mixolydian">Mixolydian</option>
                            <option value="aeolian">Aeolian (Minor)</option>
                            <option value="locrian">Locrian</option>
                        </optgroup>
                        <optgroup label="Pentatonic">
                            <option value="pentatonic_major">Major Pentatonic</option>
                            <option value="pentatonic_minor">Minor Pentatonic</option>
                        </optgroup>
                        <optgroup label="Other">
                            <option value="blues">Blues</option>
                            <option value="whole_tone">Whole Tone</option>
                            <option value="harmonic_minor">Harmonic Minor</option>
                            <option value="melodic_minor">Melodic Minor</option>
                            <option value="chromatic">Chromatic</option>
                        </optgroup>
                    </select>
                </div>
            </div>

            <div class="control-group" title="Oscillator shape; affects the timbre of triggered tones">
                <label for="waveform">Waveform</label>
                <select id="waveform">
                    <option value="sine">Sine</option>
                    <option value="triangle">Triangle</option>
                    <option value="square">Square</option>
                    <option value="sawtooth">Sawtooth</option>
                </select>
            </div>

            <div class="control-group" title="Number of reference lines; orbits trigger on each crossing">
                <label for="subdivisions">Subdivisions: <span id="subdivisions-val">1</span></label>
                <input type="range" id="subdivisions" min="1" max="12" value="1">
            </div>

            <div class="control-group" title="Simulation speed multiplier; negative values reverse direction">
                <label for="speed">Speed: <span id="speed-val">1.0</span>x</label>
                <input type="range" id="speed" min="-5" max="5" step="0.1" value="1">
            </div>

            <div class="control-group" title="Root frequency in Hz; all orbit pitches are derived from this">
                <label for="base-freq">Base: <span id="freq-val">220</span> Hz</label>
                <input type="range" id="base-freq" min="55" max="880" step="1" value="220">
            </div>

            <details class="advanced-section">
                <summary>Advanced Audio</summary>

                <div class="control-group" title="Low-pass filter with resonant sweep on each trigger">
                    <label>
                        <input type="checkbox" id="filter-enabled"> Filter Envelope
                    </label>
                </div>

                <div class="control-group" title="Filter cutoff target frequency in Hz">
                    <label for="filter-cutoff">Cutoff: <span id="cutoff-val">4000</span> Hz</label>
                    <input type="range" id="filter-cutoff" min="200" max="12000" step="100" value="4000">
                </div>

                <div class="control-group" title="Filter resonance peak intensity">
                    <label for="filter-resonance">Resonance: <span id="resonance-val">2.0</span></label>
                    <input type="range" id="filter-resonance" min="0.1" max="20" step="0.1" value="2">
                </div>

                <div class="control-group" title="Feedback delay mix level">
                    <label for="delay-wet">Delay: <span id="delay-wet-val">0%</span></label>
                    <input type="range" id="delay-wet" min="0" max="1" step="0.01" value="0">
                </div>

                <div class="control-group" title="Delay time between echoes in seconds">
                    <label for="delay-time">Delay Time: <span id="delay-time-val">0.30</span>s</label>
                    <input type="range" id="delay-time" min="0.05" max="1.5" step="0.01" value="0.3">
                </div>

                <div class="control-group" title="How much signal feeds back into the delay line">
                    <label for="delay-feedback">Feedback: <span id="delay-fb-val">40%</span></label>
                    <input type="range" id="delay-feedback" min="0" max="0.95" step="0.01" value="0.4">
                </div>

                <div class="control-group" title="Spread orbits across the stereo field (inner=left, outer=right)">
                    <label>
                        <input type="checkbox" id="stereo-enabled"> Stereo Panning
                    </label>
                </div>

                <div class="control-group" title="Random pitch variation per orbit in cents">
                    <label for="detune">Detune: <span id="detune-val">0</span> cents</label>
                    <input type="range" id="detune" min="0" max="50" step="1" value="0">
                </div>

                <div class="control-group" title="Trigger a chord interval derived from the selected ratio on each crossing">
                    <label>
                        <input type="checkbox" id="chord-enabled"> Chord Mode
                    </label>
                </div>
            </details>

            <details class="advanced-section">
                <summary>Advanced Visual</summary>

                <div class="control-group" title="Draw connecting lines between orbits on convergence events">
                    <label>
                        <input type="checkbox" id="convergence-lines"> Convergence Lines
                    </label>
                </div>

                <div class="control-group" title="Persistent fading trails that accumulate into spirograph patterns">
                    <label>
                        <input type="checkbox" id="spiral-trails"> Spiral Trails
                    </label>
                </div>

                <div class="control-group" title="How the traced point is computed between orbits">
                    <label for="spiral-mode">Spiral Mode</label>
                    <select id="spiral-mode">
                        <option value="epitrochoid" title="Single trace from inner+outer orbit angles, like a spirograph pen">Epitrochoid</option>
                        <option value="adjacent" title="One trace per adjacent orbit pair">Adjacent</option>
                        <option value="star" title="Traces from inner orbit to evenly spaced outer orbits">Star</option>
                        <option value="lissajous" title="Traces from mirrored orbit pairs (inner/outer, 2nd/2nd-last, etc.)">Lissajous</option>
                    </select>
                </div>

                <div class="control-group" title="Controls the blend position between the two reference points">
                    <label for="spiral-blend">Blend: <span id="spiral-blend-val">50%</span></label>
                    <input type="range" id="spiral-blend" min="0" max="100" step="1" value="50">
                </div>

                <div class="control-group" title="Color palette for the visualization">
                    <label for="theme">Theme</label>
                    <select id="theme">
                        <option value="catppuccin">Catppuccin</option>
                        <option value="classic">Classic</option>
                        <option value="warm">Warm</option>
                        <option value="cool">Cool</option>
                        <option value="mono">Monochrome</option>
                        <option value="high_contrast">High Contrast</option>
                    </select>
                </div>

                <div class="control-group" title="Add a soft glow bloom effect over the visualization">
                    <label>
                        <input type="checkbox" id="bloom-enabled"> Bloom / Glow
                    </label>
                </div>

                <div class="control-group" title="Intensity of the bloom glow effect">
                    <label for="bloom-intensity">Bloom: <span id="bloom-val">50%</span></label>
                    <input type="range" id="bloom-intensity" min="0" max="100" step="1" value="50">
                </div>
            </details>
        </div>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
