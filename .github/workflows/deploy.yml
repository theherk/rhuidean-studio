name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown

      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: Build WASM
        run: wasm-pack build --target web

      - name: Assemble site
        run: |
          mkdir -p _site/pkg
          cp www/* _site/
          cp pkg/rhuidean_studio_bg.wasm _site/pkg/
          cp pkg/rhuidean_studio.js _site/pkg/
          echo "rhuidean.studio" > _site/CNAME

      - name: Fix import path
        run: sed -i 's|\.\./pkg/|./pkg/|' _site/main.js

      - uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
